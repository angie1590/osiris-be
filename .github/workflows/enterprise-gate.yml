name: Enterprise Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  enterprise-gate:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: test
      SRI_MODO_EMISION: NO_ELECTRONICO
      FEEC_TIPO_EMISION: "1"
      FEEC_REGIMEN: GENERAL
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost/osiris_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: osiris_test
      RUN_LIVE_SMOKE: "false"
      PYTHONPATH: ./src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Enterprise Gate
        run: make enterprise-gate
