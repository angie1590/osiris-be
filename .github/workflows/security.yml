name: Security Scans

on:
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sast-and-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Install security tooling
        run: poetry run python -m pip install --quiet bandit pip-audit

      - name: Bandit (SAST)
        run: poetry run bandit -q -r src -x src/osiris/db/alembic

      - name: Pip audit (dependencies)
        run: poetry run pip-audit
